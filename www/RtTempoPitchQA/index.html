<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rusty-player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>rusty-player</h1>
    </header>

    <div id="upload-zone">
      <label class="file-btn">
        Load MP3
        <input type="file" id="file-input" accept=".mp3,audio/mpeg" />
      </label>
      <button id="btn-test-tone" class="file-btn" style="margin-left:8px;cursor:pointer;">Test Tone (440Hz)</button>
      <div id="track-info">No track loaded</div>
    </div>

    <div id="controls" class="hidden">
      <div id="xy-container">
        <div class="axis-label label-top">+12 st</div>
        <div class="axis-label label-bottom">-12 st</div>
        <div class="axis-label label-left">0.5x</div>
        <div class="axis-label label-right">2.0x</div>
        <div id="xy-pad">
          <div id="crosshair-h"></div>
          <div id="crosshair-v"></div>
          <div id="xy-dot"></div>
        </div>
      </div>

      <div id="param-display">
        <div class="param">
          <span class="param-label">TEMPO</span>
          <span id="tempo-display" class="param-value">1.00x</span>
        </div>
        <div class="param">
          <span class="param-label">PITCH</span>
          <span id="pitch-display" class="param-value">0.0 st</span>
        </div>
      </div>

      <div id="transport">
        <button id="btn-play" title="Play">&#9654;</button>
        <button id="btn-pause" title="Pause">&#9646;&#9646;</button>
        <button id="btn-stop" title="Stop">&#9632;</button>
        <button id="btn-reset" title="Reset XY">&#8634;</button>
        <button id="btn-ms" class="toggle-on" title="Stereo width preservation">M/S</button>
        <span id="time-display">0:00 / 0:00</span>
      </div>

      <div id="gain-comp">
        <span class="param-label">GAIN COMP</span>
        <input type="range" id="gain-slider" min="0" max="100" value="35" />
        <span id="gain-value" class="param-value-sm">35%</span>
      </div>

      <div id="quality-section">
        <span class="section-label">QUALITY</span>
        <div id="quality-toggles">
          <button id="btn-phase-lock" class="toggle-on" title="Identity phase locking (reduces phasiness)">Phase Lock</button>
          <button id="btn-transient" class="toggle-off" title="Transient detection with phase reset">Transient</button>
          <button id="btn-cubic" class="toggle-off" title="Cubic Hermite interpolation (flatter HF response)">Cubic</button>
          <button id="btn-limiter" class="toggle-off" title="Soft limiter (prevents clipping)">Limiter</button>
        </div>
        <div id="transient-sens" class="hidden">
          <span class="param-label">SENSITIVITY</span>
          <input type="range" id="sens-slider" min="0" max="100" value="50" />
          <span id="sens-value" class="param-value-sm">50%</span>
        </div>
      </div>
    </div>

    <div id="status">Initializing...</div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
